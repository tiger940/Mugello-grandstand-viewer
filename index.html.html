<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mugello Grandstand Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
      background: transparent;
      overflow-x: hidden;
    }
    body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

<div id="rt-wrap" style="width:100%;max-width:700px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:transparent;border-radius:12px;overflow:hidden;position:relative;">

  <div id="rt-map-stage" style="position:relative;width:100%;overflow:hidden;border-radius:12px;border:1.5px solid rgba(45,48,71,0.18);">

    <img id="rt-map" src="https://elbowsdown.com/wp-content/uploads/2026/06/1-1.png" alt="Mugello circuit map — tap a grandstand to see the view" style="width:100%;display:block;transition:transform 0.55s cubic-bezier(0.4,0,0.2,1),filter 0.55s cubic-bezier(0.4,0,0.2,1);transform-origin:center center;">

    <!-- PIN 0 — Sic 58 -->
    <button onclick="rtOpen(0)" style="position:absolute;left:5%;top:8%;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;" aria-label="Sic 58">
      <div style="width:34px;height:34px;border-radius:50%;background:#F28F3B;border:2.5px solid #2D3047;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 10px rgba(45,48,71,0.3);font-size:15px;">📷</div>
      <span style="font-size:8px;font-weight:700;color:#2D3047;margin-top:4px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:3px;border:1px solid rgba(45,48,71,0.15);">Sic 58</span>
    </button>

    <!-- PIN 1 — Scarperia -->
    <button onclick="rtOpen(1)" style="position:absolute;left:30%;top:9%;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;" aria-label="Scarperia">
      <div style="width:34px;height:34px;border-radius:50%;background:#F28F3B;border:2.5px solid #2D3047;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 10px rgba(45,48,71,0.3);font-size:15px;">📷</div>
      <span style="font-size:8px;font-weight:700;color:#2D3047;margin-top:4px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:3px;border:1px solid rgba(45,48,71,0.15);">Scarperia</span>
    </button>

    <!-- PIN 2 — Correntaio -->
    <button onclick="rtOpen(2)" style="position:absolute;left:67%;top:50%;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;" aria-label="Correntaio">
      <div style="width:34px;height:34px;border-radius:50%;background:#F28F3B;border:2.5px solid #2D3047;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 10px rgba(45,48,71,0.3);font-size:15px;">📷</div>
      <span style="font-size:8px;font-weight:700;color:#2D3047;margin-top:4px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:3px;border:1px solid rgba(45,48,71,0.15);">Correntaio</span>
    </button>

    <!-- PIN 3 — Centrale -->
    <button onclick="rtOpen(3)" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;" aria-label="Centrale">
      <div style="width:34px;height:34px;border-radius:50%;background:#F28F3B;border:2.5px solid #2D3047;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 10px rgba(45,48,71,0.3);font-size:15px;">📷</div>
      <span style="font-size:8px;font-weight:700;color:#2D3047;margin-top:4px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:3px;border:1px solid rgba(45,48,71,0.15);">Centrale</span>
    </button>

    <!-- PIN 4 — San Donato -->
    <button onclick="rtOpen(4)" style="position:absolute;left:95%;top:87%;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;" aria-label="San Donato">
      <div style="width:34px;height:34px;border-radius:50%;background:#F28F3B;border:2.5px solid #2D3047;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 10px rgba(45,48,71,0.3);font-size:15px;">📷</div>
      <span style="font-size:8px;font-weight:700;color:#2D3047;margin-top:4px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:3px;border:1px solid rgba(45,48,71,0.15);">S Donato</span>
    </button>

    <!-- PIN 5 — Borgo San Lorenzo -->
    <button onclick="rtOpen(5)" style="position:absolute;left:50%;top:82%;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;" aria-label="Borgo San Lorenzo">
      <div style="width:34px;height:34px;border-radius:50%;background:#F28F3B;border:2.5px solid #2D3047;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 10px rgba(45,48,71,0.3);font-size:15px;">📷</div>
      <span style="font-size:8px;font-weight:700;color:#2D3047;margin-top:4px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:3px;border:1px solid rgba(45,48,71,0.15);">Borgo S Lorenzo</span>
    </button>

    <!-- PIN 6 — Casanova -->
    <button onclick="rtOpen(6)" style="position:absolute;left:25%;top:67%;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;" aria-label="Casanova">
      <div style="width:34px;height:34px;border-radius:50%;background:#F28F3B;border:2.5px solid #2D3047;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 10px rgba(45,48,71,0.3);font-size:15px;">📷</div>
      <span style="font-size:8px;font-weight:700;color:#2D3047;margin-top:4px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:3px;border:1px solid rgba(45,48,71,0.15);">Casanova</span>
    </button>

    <!-- Photo panel -->
    <div id="rt-panel" style="position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s 0.22s;background:#ffffff;border-radius:12px;overflow:hidden;">

      <div style="flex:1;position:relative;overflow:hidden;background:#f0f1f5;min-height:200px;">
        <img id="rt-photo" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;">

        <div id="rt-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;position:absolute;inset:0;">
          <div id="rt-icon" style="font-size:52px;">📷</div>
          <div id="rt-note" style="font-size:13px;color:rgba(45,48,71,0.55);font-weight:500;"></div>
          <div style="font-size:11px;color:rgba(45,48,71,0.3);">Photo coming soon</div>
        </div>

        <div id="rt-sector" style="position:absolute;top:12px;left:12px;background:#F28F3B;color:#fff;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:4px 12px;border-radius:20px;z-index:2;"></div>

        <button onclick="rtClose()" style="position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:#2D3047;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;font-size:17px;color:#fff;line-height:1;" aria-label="Back to map">✕</button>
      </div>

      <div style="background:#fff;padding:12px 14px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-top:1.5px solid rgba(45,48,71,0.1);flex-shrink:0;">
        <div>
          <p id="rt-title" style="font-size:15px;font-weight:700;color:#2D3047;line-height:1.2;margin:0 0 3px;"></p>
          <p id="rt-desc" style="font-size:12px;color:rgba(45,48,71,0.55);line-height:1.5;margin:0;"></p>
        </div>
        <button onclick="rtClose()" style="flex-shrink:0;background:#F28F3B;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.03em;white-space:nowrap;">← Map</button>
      </div>

    </div>
  </div>

  <p style="text-align:center;padding:8px 0 2px;font-size:11px;color:rgba(45,48,71,0.4);letter-spacing:0.03em;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">📍 Tap a grandstand marker to see the view</p>
</div>

<script>
var rtSpots = [
  {
    name: "Sic 58",
    sector: "Sector 3",
    desc: "Overlooks both Arrabbiata curves with clear sightlines of two turns and overtaking action. Easy road access.",
    img: "https://elbowsdown.com/wp-content/uploads/2026/06/sic-58.png",
    pinLeft: 5, pinTop: 8
  },
  {
    name: "Scarperia",
    sector: "Sector 3",
    desc: "Camping area with elevated views, but sightlines are limited. A circuit dead-end.",
    img: "https://elbowsdown.com/wp-content/uploads/2026/06/scarperia.png",
    pinLeft: 30, pinTop: 9
  },
  {
    name: "Correntaio",
    sector: "Sector 3",
    desc: "Ducati fan stand with views from Palagio into the Biondetti S's. Slow track section close to the fan zones, but nothing spectacular.",
    img: "https://elbowsdown.com/wp-content/uploads/2026/06/correntaio.png",
    pinLeft: 67, pinTop: 50
  },
  {
    name: "Centrale",
    sector: "Sector 4",
    desc: "The only covered grandstand with arguably the best view. Silver and Gold tickets let you use both sides, providing views of the main straight and grid, and the Biondetti S's.",
    img: "https://elbowsdown.com/wp-content/uploads/2026/06/centrale.png",
    pinLeft: 50, pinTop: 50
  },
  {
    name: "San Donato",
    sector: "Sector 1",
    desc: "The hardest braking point on the calendar. Some of the most stunning views, but you will need a big blanket as there are no formal viewing areas.",
    img: "https://elbowsdown.com/wp-content/uploads/2026/06/san-donato.png",
    pinLeft: 95, pinTop: 87
  },
  {
    name: "Borgo San Lorenzo",
    sector: "Sector 2",
    desc: "Great views of Poggio Secco corner & Materassi straight. Uncovered but sweeping track overview.",
    img: "https://elbowsdown.com/wp-content/uploads/2026/06/borgo-s-lorenzo.png",
    pinLeft: 50, pinTop: 82
  },
  {
    name: "Casanova",
    sector: "Sector 2",
    desc: "Top-down circuit views near the main paddock entrance & food stalls, but arrive early — no grandstands, and it gets crowded.",
    img: "https://elbowsdown.com/wp-content/uploads/2026/06/casanova.png",
    pinLeft: 25, pinTop: 67
  }
];

function rtOpen(idx) {
  var s = rtSpots[idx];
  var mapEl   = document.getElementById("rt-map");
  var panel   = document.getElementById("rt-panel");
  var photoEl = document.getElementById("rt-photo");
  var ph      = document.getElementById("rt-placeholder");

  var scale = 2.6;
  var tx = (0.5 - s.pinLeft / 100) * 100 * (scale - 1) * 0.38;
  var ty = (0.5 - s.pinTop  / 100) * 100 * (scale - 1) * 0.38;
  mapEl.style.transform = "scale(" + scale + ") translate(" + tx + "%, " + ty + "%)";
  mapEl.style.filter    = "brightness(0.4) blur(1px)";

  document.getElementById("rt-sector").textContent = s.sector;
  document.getElementById("rt-title").textContent  = s.name;
  document.getElementById("rt-desc").textContent   = s.desc;

  if (s.img) {
    photoEl.src           = s.img;
    photoEl.alt           = s.name + " view";
    photoEl.style.display = "block";
    ph.style.display      = "none";
  } else {
    photoEl.style.display = "none";
    ph.style.display      = "flex";
    document.getElementById("rt-note").textContent = s.name;
  }

  setTimeout(function() {
    panel.style.opacity       = "1";
    panel.style.pointerEvents = "all";
  }, 260);
}

function rtClose() {
  var mapEl = document.getElementById("rt-map");
  var panel = document.getElementById("rt-panel");
  panel.style.opacity       = "0";
  panel.style.pointerEvents = "none";
  setTimeout(function() {
    mapEl.style.transform = "scale(1) translate(0, 0)";
    mapEl.style.filter    = "";
  }, 100);
}
</script>

</body>
</html>
